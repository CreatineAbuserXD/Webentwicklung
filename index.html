<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taschenrechner</title>
</head>
<body>
    <h1>Taschenrechner</h1> 
        <label for="num1">Eingabe Zahl 1
            <div> 
            <input id="num1" type="text" placeholder="z.B 5" />
            </div>
        </label>
      <br>
    
        <div>
            <label for="num2">Eingabe Zahl 2
                <div>
                <input id="num2" type="text" placeholder="z.B 10" />
                </div>
            </label>
        </div>

        <br>

        <div class="ops">
            <button id="add" data-op="+">+</button>
            <button id="subtract" data-op="-">-</button>
            <button id="multiply" data-op="*">*</button>
            <button id="divide" data-op="/">/</button>
        </div>
        <br>

        <div>
        <h2>Ergebnis: </h2><span id="result"> </span>
        </div>

        <div>
        <h2>Historie</h2>
        <ul id="history"></ul>
        </div>

<script src="app.js"></script>
</body>
</html>
